<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>To-Do List</title>

        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />


        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <header>
            
        </header>
        <main class="container mt-5">
            <div class="row justify-content-center">

                <div class="col-md-8 com-lg-6">
                    <h2 class="text-center title mb-5">To-Do List</h2>

                    <div class="row">
                        <div class="col-8">
                            <input type="text" id="taskInput" class="form-control" placeholder="Enter a task" />
                        </div>
                        <div class="col-4">
                            <button id="addTaskBtn" class="btn addtask w-100">Add Task</button>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <ul id="taskList" class="list-group mt-4"></ul>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <button id="clearTaskBtn" class="btn clear w-100">Clear All Tasks</button>
                    </div>
                </div>
            </div>
            </div>

        </main>
        <footer>
            
        </footer>
        
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <script src="script.js"></script>
    </body>
</html>
